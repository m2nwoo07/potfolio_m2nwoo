<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieFlix - 현재 상영 중인 영화</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- 헤더 네비게이션 -->
  <header class="header" id="header">
    <div class="header__logo">
      <span class="logo-icon">🎬</span>
      <span class="logo-text">MovieFlix</span>
    </div>
    <nav class="header__nav">
      <a href="#" class="nav-link active" data-tab="home">홈</a>
      <a href="#" class="nav-link" data-tab="movies">영화</a>
      <a href="#" class="nav-link" data-tab="series">시리즈</a>
    </nav>
    <div class="header__actions">
      <button class="search-btn" id="searchToggle">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z"/>
        </svg>
      </button>
      <div class="search-bar" id="searchBar">
        <input type="text" id="searchInput" placeholder="영화 제목 검색..." />
      </div>
    </div>
  </header>

  <!-- 히어로 배너 -->
  <section class="hero" id="hero">
    <div class="hero__backdrop" id="heroBackdrop"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content" id="heroContent">
      <div class="hero__badge" id="heroBadge">지금 상영 중</div>
      <h1 class="hero__title" id="heroTitle">영화를 불러오는 중...</h1>
      <p class="hero__overview" id="heroOverview"></p>
      <div class="hero__meta" id="heroMeta"></div>
      <div class="hero__buttons">
        <button class="btn btn--primary" id="heroPlayBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M11.596 8.697l-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
          </svg>
          재생
        </button>
        <button class="btn btn--secondary" id="heroInfoBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
            <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533L8.93 6.588zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
          </svg>
          상세 정보
        </button>
      </div>
    </div>
    <div class="hero__scroll-indicator">
      <span>스크롤</span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- 메인 컨텐츠 -->
  <main class="main">

    <!-- 현재 상영 중 섹션 -->
    <section class="section" id="nowPlayingSection">
      <div class="section__header">
        <h2 class="section__title" id="sectionTitle">
          <span class="title-accent" id="sectionIcon">🔥</span>
          <span id="sectionLabel">현재 상영 중</span>
        </h2>
        <span class="section__count" id="movieCount"></span>
      </div>

      <!-- 로딩 스피너 -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>영화 정보를 불러오는 중...</p>
      </div>

      <!-- 에러 메시지 -->
      <div class="error" id="error" style="display:none;">
        <div class="error__icon">⚠️</div>
        <p class="error__message" id="errorMessage">영화 정보를 불러올 수 없습니다.</p>
        <button class="btn btn--primary" onclick="fetchMovies()">다시 시도</button>
      </div>

      <!-- 영화 그리드 -->
      <div class="movie-grid" id="movieGrid"></div>

      <!-- 더 보기 버튼 -->
      <div class="load-more" id="loadMore" style="display:none;">
        <button class="btn btn--outline" id="loadMoreBtn">더 많은 영화 보기</button>
      </div>
    </section>
  </main>

  <!-- 영화 상세 모달 -->
  <div class="modal" id="modal">
    <div class="modal__backdrop" id="modalBackdrop"></div>
    <div class="modal__container">
      <button class="modal__close" id="modalClose">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
          <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854z"/>
        </svg>
      </button>
      <div class="modal__hero">
        <img class="modal__backdrop-img" id="modalBackdropImg" src="" alt="" />
        <div class="modal__hero-overlay"></div>
        <div class="modal__hero-info">
          <h2 class="modal__title" id="modalTitle"></h2>
          <div class="modal__buttons">
            <button class="btn btn--primary">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M11.596 8.697l-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
              </svg>
              재생
            </button>
            <button class="btn btn--ghost">+ 내 리스트</button>
          </div>
        </div>
      </div>
      <div class="modal__body">
        <div class="modal__meta" id="modalMeta"></div>
        <p class="modal__overview" id="modalOverview"></p>
        <div class="modal__poster-section">
          <img class="modal__poster" id="modalPoster" src="" alt="" />
          <div class="modal__details" id="modalDetails"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 푸터 -->
  <footer class="footer">
    <div class="footer__content">
      <div class="footer__logo">
        <span class="logo-icon">🎬</span>
        <span class="logo-text">MovieFlix</span>
      </div>
      <p class="footer__text">영화 데이터 제공: <a href="https://www.themoviedb.org" target="_blank">The Movie Database (TMDB)</a></p>
      <p class="footer__copy">© 2026 MovieFlix. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
